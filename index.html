<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f5f7fa; color: #333; line-height: 1.6;
}
.header {
  background: linear-gradient(135deg, #1a237e 0%, #283593 50%, #3949ab 100%);
  color: #fff; padding: 28px 40px;
}
.header h1 { font-size: 24px; font-weight: 700; }
.header p { font-size: 14px; opacity: 0.85; margin-top: 4px; }
.container { max-width: 1400px; margin: 0 auto; padding: 24px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

/* Selector */
.selector-panel {
  background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  padding: 20px 24px; margin-bottom: 20px; display: flex; align-items: center; gap: 16px;
}
.selector-panel label { font-weight: 600; font-size: 15px; white-space: nowrap; }
.month-select {
  padding: 10px 14px; border: 2px solid #3949ab; border-radius: 8px;
  font-size: 14px; outline: none; background: #e8eaf6; cursor: pointer; min-width: 140px;
  font-weight: 600; color: #1a237e;
}
.dept-select {
  padding: 10px 14px; border: 2px solid #e0e0e0; border-radius: 8px;
  font-size: 14px; outline: none; transition: border-color 0.2s; min-width: 180px;
  background: #fff; cursor: pointer;
}
.dept-select:focus { border-color: #3949ab; }
.member-select {
  flex: 1; padding: 10px 14px; border: 2px solid #e0e0e0; border-radius: 8px;
  font-size: 14px; outline: none; transition: border-color 0.2s; max-width: 400px;
}
.member-select:focus { border-color: #3949ab; }

/* Cards */
.card {
  background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  padding: 20px 24px; margin-bottom: 20px;
}
.card h2 { font-size: 17px; font-weight: 700; margin-bottom: 16px; color: #1a237e; }
.card h3 { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #555; }

/* Status badges */
.badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
.badge-red { background: #ffebee; color: #c62828; }
.badge-orange { background: #fff3e0; color: #e65100; }
.badge-yellow { background: #fffde7; color: #f9a825; }
.badge-green { background: #e8f5e9; color: #2e7d32; }

/* Metric boxes */
.metric-row { display: flex; gap: 12px; flex-wrap: wrap; }
.metric-box {
  flex: 1; min-width: 130px; padding: 14px; border-radius: 10px;
  text-align: center; border: 2px solid transparent;
}
.metric-box.good { background: #e8f5e9; border-color: #a5d6a7; }
.metric-box.warn { background: #fff3e0; border-color: #ffcc80; }
.metric-box.bad { background: #ffebee; border-color: #ef9a9a; }
.metric-box.neutral { background: #f5f5f5; border-color: #e0e0e0; }
.metric-val { font-size: 28px; font-weight: 800; }
.metric-label { font-size: 12px; color: #666; margin-top: 2px; }
.metric-vs { font-size: 11px; margin-top: 2px; }

/* Decision tree */
.decision-path {
  display: flex; flex-direction: column; gap: 12px;
  padding-left: 20px; border-left: 3px solid #3949ab;
}
.decision-node {
  padding: 10px 14px; border-radius: 8px; font-size: 14px;
}
.decision-node.pass { background: #e8f5e9; border-left: 4px solid #43a047; }
.decision-node.warn { background: #fff3e0; border-left: 4px solid #ef6c00; }
.decision-node.fail { background: #ffebee; border-left: 4px solid #e53935; }
.decision-node.info { background: #e3f2fd; border-left: 4px solid #1e88e5; }

/* Recommendation boxes */
.rec-box {
  padding: 14px 18px; border-radius: 8px; margin-bottom: 10px;
}
.rec-box.urgent { background: #ffebee; border: 1px solid #ef9a9a; }
.rec-box.primary { background: #fff3e0; border: 1px solid #ffcc80; }
.rec-box.secondary { background: #e3f2fd; border: 1px solid #90caf9; }
.rec-title { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
.rec-desc { font-size: 13px; color: #555; }

/* Methodology section */
.methodology { font-size: 14px; color: #555; }
.methodology table { width: 100%; border-collapse: collapse; font-size: 13px; }
.methodology th { background: #e8eaf6; padding: 8px; text-align: left; }
.methodology td { padding: 8px; border-bottom: 1px solid #f0f0f0; }

.chart-container { max-width: 420px; margin: 0 auto; }

/* Dept summary */
.dept-summary-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 16px; }
.dept-summary-big { font-size: 32px; font-weight: 800; }
.dept-rank-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.dept-rank-table th { background: #e8eaf6; padding: 10px 8px; text-align: left; font-size: 12px; border-bottom: 2px solid #c5cae9; }
.dept-rank-table td { padding: 8px; border-bottom: 1px solid #f0f0f0; }
.dept-rank-table tr:hover { background: #f5f5ff; }
.rank-bar-wrap { width: 100%; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; }
.rank-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }
.rank-bar-fill.good { background: #43a047; }
.rank-bar-fill.warn { background: #ef6c00; }
.rank-bar-fill.bad { background: #e53935; }
.member-chip { display: inline-block; padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 2px solid #e0e0e0; margin: 3px; transition: all 0.2s; }
.member-chip:hover { border-color: #3949ab; background: #e8eaf6; }
.member-chip.alert { border-color: #ef9a9a; background: #ffebee; }
.member-chip.good { border-color: #a5d6a7; background: #e8f5e9; }

/* No data */
.empty-state { text-align: center; padding: 60px 20px; color: #999; }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
</style>
</head>

      b['下月' + dim + '跟进率'] = calcMedian(dm.map(m => (m[pfx + '跟进率']||0)*100));
      b['下月' + dim + '转化率'] = calcMedian(dm.map(m => (m[pfx + '转化率']||0)*100));
    });
    deptBenchmarks[dept] = b;
  });
  
  console.log('月份切换完成：' + monthKey + '，有效业务员：' + allMembers.length);
  
  // 重置部门选择器（保持当前部门选择）
  var currentDeptVal = document.getElementById('deptSelect').value;
  document.getElementById('diagnosePanel').innerHTML = '';
  document.getElementById('memberSelect').innerHTML = '<option value="">-- 请选择业务员 --</option>';
  
  if (currentDeptVal) {
    populateSelect(currentDeptVal);
    showDeptSummary(currentDeptVal);
  } else {
    document.getElementById('deptSummaryPanel').style.display = 'none';
    document.getElementById('emptyPanel').style.display = 'block';
  }
}

// ===== 诊断引擎 =====
function runDiagnose(name) {
  var m = memberMap[name];
  if (!m) { console.error('未找到业务员：' + name); return; }
  var dept = m['部门'];
  var bench = deptBenchmarks[dept] || {};

  var findings = [];

  // Level 1: 业绩结果
  var achRate = m['达成率'];
  var hasTarget = m['GMV目标'] > 0;
  if (!hasTarget) {
    findings.push({ level: 1, tag: '目标未设定', detail: 'GMV目标未设定，实际GMV ¥' + (m['GMV']/10000).toFixed(1) + '万。请先在目标表中录入该业务员目标。', severity: 'warn' });
  } else if (achRate < TIME_PROGRESS) {
    findings.push({ level: 1, tag: '业绩滞后', detail: 'GMV达成率 ' + achRate.toFixed(1) + '%，低于时间进度 ' + TIME_PROGRESS + '%，差距 ' + (TIME_PROGRESS - achRate).toFixed(1) + ' 个百分点', severity: 'fail' });
  } else {
    findings.push({ level: 1, tag: '业绩达标', detail: 'GMV达成率 ' + achRate.toFixed(1) + '%，高于时间进度 ' + TIME_PROGRESS + '%', severity: 'pass' });
  }

  // Level 2: 结构诊断
  var renewRatio = m['续保占比'];
  var renewRatioBench = bench['续保GMV占比'] || 65;
  if (renewRatioBench > 0 && renewRatio > renewRatioBench + 5) {
    findings.push({ level: 2, tag: '续保依赖型', detail: '续保GMV占比 ' + renewRatio.toFixed(1) + '%（部门中位 ' + renewRatioBench.toFixed(1) + '%），业绩以续保为主', severity: 'info' });
  } else if (renewRatioBench > 0 && renewRatio < renewRatioBench - 5) {
    findings.push({ level: 2, tag: '新增驱动型', detail: '续保GMV占比 ' + renewRatio.toFixed(1) + '%（部门中位 ' + renewRatioBench.toFixed(1) + '%），更依赖新增/非续保贡献', severity: 'info' });
  } else {
    findings.push({ level: 2, tag: '均衡型', detail: '续保GMV占比 ' + renewRatio.toFixed(1) + '%，与部门中位(' + renewRatioBench.toFixed(1) + '%)接近，结构均衡', severity: 'pass' });
  }

  // Level 3: 各维度过程诊断（本月到期）
  var dims = ['次年', '新增', '往年', '战败'];
  var dimResults = {};
  dims.forEach(function(dim) {
    var equip = m[dim + '_' + dim + '设备数'] || 0;
    var followRate = (m[dim + '_' + dim + '跟进率'] || 0) * 100;
    var dealRate = (m[dim + '_' + dim + '转化率'] || 0) * 100;
    var gmv = m[dim + '_GMV'] || 0;
    var equipBench = bench[dim + '设备数'] || 0;
    var followBench = bench[dim + '跟进率'] || 0;
    var dealBench = bench[dim + '转化率'] || 0;
    var issues = [];
    if (equipBench > 0 && equip > 0 && equip < equipBench * 0.7) issues.push('量不足');
    if (followBench > 0 && followRate > 0 && followRate < followBench - 5) issues.push('跟进低');
    if (dealBench > 0 && dealRate > 0 && dealRate < dealBench - 5) issues.push('转化低');
    dimResults[dim] = { equip: equip, equipBench: equipBench, followRate: followRate, followBench: followBench, dealRate: dealRate, dealBench: dealBench, gmv: gmv, issues: issues, status: issues.length === 0 ? 'good' : (issues.length === 1 ? 'warn' : 'bad') };
    if (issues.length > 0) {
      findings.push({ level: 3, tag: dim + '商机: ' + issues.join('+'), detail: '设备' + equip + '（中位' + equipBench + '）、跟进率' + followRate.toFixed(0) + '%（中位' + followBench.toFixed(0) + '%）、转化率' + dealRate.toFixed(0) + '%（中位' + dealBench.toFixed(0) + '%）', severity: dimResults[dim].status === 'bad' ? 'fail' : 'warn' });
    }
  });

  // Level 3延伸: 下月到期商机过程诊断
  var dimResultsNext = {};
  dims.forEach(function(dim) {
    var pfx = '下月_' + dim + '_' + dim;
    var equip = m[pfx + '设备数'] || 0;
    var followRate = (m[pfx + '跟进率'] || 0) * 100;
    var dealRate = (m[pfx + '转化率'] || 0) * 100;
    var gmv = m['下月_' + dim + '_GMV'] || 0;
    var equipBench = bench['下月' + dim + '设备数'] || 0;
    var followBench = bench['下月' + dim + '跟进率'] || 0;
    var dealBench = bench['下月' + dim + '转化率'] || 0;
    var issues = [];
    if (equipBench > 0 && equip > 0 && equip < equipBench * 0.7) issues.push('量不足');
    if (followBench > 0 && followRate > 0 && followRate < followBench - 5) issues.push('跟进低');
    if (dealBench > 0 && dealRate > 0 && dealRate < dealBench - 5) issues.push('转化低');
    dimResultsNext[dim] = { equip: equip, equipBench: equipBench, followRate: followRate, followBench: followBench, dealRate: dealRate, dealBench: dealBench, gmv: gmv, issues: issues, status: issues.length === 0 ? 'good' : (issues.length === 1 ? 'warn' : 'bad') };
    if (issues.length > 0) {
      findings.push({ level: 3, tag: '下月' + dim + '商机: ' + issues.join('+'), detail: '下月到期设备' + equip + '（中位' + equipBench + '）、跟进率' + followRate.toFixed(0) + '%（中位' + followBench.toFixed(0) + '%）、转化率' + dealRate.toFixed(0) + '%（中位' + dealBench.toFixed(0) + '%）', severity: dimResultsNext[dim].status === 'bad' ? 'fail' : 'warn' });
    }
  });

  // Level 4: 根因分类
  var rootCauses = [];
  if (hasTarget && achRate < TIME_PROGRESS) rootCauses.push('业绩滞后时间进度');
  var mainDim = renewRatio > 50 ? '次年' : '新增';
  var dr = dimResults[mainDim];
  if (dr && dr.issues.indexOf('量不足') >= 0) rootCauses.push(mainDim + '客户池不足');
  if (dr && dr.issues.indexOf('跟进低') >= 0) rootCauses.push(mainDim + '跟进执行不力');
  if (dr && dr.issues.indexOf('转化低') >= 0) rootCauses.push(mainDim + '销售转化能力弱');
  if (renewRatio > 50 && rootCauses.indexOf('次年客户池不足') < 0 && rootCauses.indexOf('次年跟进执行不力') < 0 && rootCauses.indexOf('次年销售转化能力弱') < 0) {
    var xn = dimResults['新增'];
    if (xn && xn.issues.length > 0) rootCauses.push('新增商机开拓不足（续保依赖型的短板）');
  }
  if (rootCauses.length === 0) {
    if (hasTarget && achRate >= TIME_PROGRESS) rootCauses.push('各维度均衡发展，业绩达标');
    else rootCauses.push('各维度表现均衡，建议关注目标设定或客户质量');
  }

  var recs = generateRecommendations(m, dimResults, dimResultsNext, rootCauses, renewRatio, bench);
  renderDiagnose(m, dept, bench, findings, dimResults, dimResultsNext, rootCauses, recs);
}

function generateRecommendations(m, dimResults, dimResultsNext, rootCauses, renewRatio, bench) {
  var recs = [];
  var metTarget = m['GMV目标'] > 0 && m['达成率'] >= TIME_PROGRESS;

  rootCauses.forEach(function(cause) {
    if (cause.indexOf('客户池不足') >= 0) {
      var dim = cause.indexOf('次年') >= 0 ? '次年' : (cause.indexOf('新增') >= 0 ? '新增' : '');
      var dimLabel = dim === '次年' ? '续保' : '新客';
      recs.push({ priority: 'urgent', title: '【紧急】拓展' + dimLabel + '客户来源', desc: '当前' + dim + '设备数低于部门中位数。建议：1 梳理系统中未分配/沉睡客户资源；2 加强老客户转介绍引导；3 与市场部协同获取更多线索。' });
    }
    if (cause.indexOf('跟进执行不力') >= 0) {
      var dim = cause.indexOf('次年') >= 0 ? '次年' : (cause.indexOf('新增') >= 0 ? '新增' : '');
      recs.push({ priority: 'urgent', title: '【紧急】提升' + (dim || '客户') + '跟进执行力', desc: '跟进率低于部门中位数。建议：1 设定每日最低跟进量目标（如20通有效外呼）；2 使用CRM跟进提醒防止遗漏；3 业务经理每日夕会抽查跟进记录。' });
    }
    if (cause.indexOf('转化能力弱') >= 0) {
      var dim = cause.indexOf('次年') >= 0 ? '次年' : (cause.indexOf('新增') >= 0 ? '新增' : '');
      var dimLabel = dim === '次年' ? '续保' : (dim === '新增' ? '新客' : '客户');
      recs.push({ priority: 'primary', title: '【重点】提升' + dimLabel + '转化技巧', desc: '转化率低于部门中位数。建议：1 安排TOP销售1v1辅导（录音分析/话术演练）；2 针对' + (dim === '次年' ? '续保客户强调服务连续性和优惠' : '新客强调产品价值和品牌信任') + '；3 参加销售技巧专项培训。' });
    }
    if (cause.indexOf('目标设定') >= 0 || cause.indexOf('客户质量') >= 0) {
      if (!metTarget) {
        recs.push({ priority: 'secondary', title: '【关注】检视目标设定与客户结构', desc: '各过程指标表现尚可但业绩未达标（当前达成率' + m['达成率'].toFixed(0) + '%），可能原因：1 GMV目标设定偏高；2 客户平均客单价偏低。建议：分析客户分层，优先跟进高价值客户。' });
      }
    }
    if (cause.indexOf('均衡发展') >= 0 && metTarget) {
      recs.push({ priority: 'secondary', title: '【保持】各维度均衡发展，业绩达标', desc: '当前各商机维度过程指标表现均衡且业绩已达标。建议：1 保持现有跟进节奏和客户经营策略；2 考虑适度挑战更高目标；3 关注月度波动趋势，提前做好下月客户储备。' });
    }
  });

  if (renewRatio > 70) {
    if (metTarget) {
      recs.push({ priority: 'secondary', title: '【巩固】续保盘稳固，业绩表现好', desc: '续保GMV占比偏高（>70%）但业绩已达标，说明续保客户经营能力强。建议：在稳固续保基本盘的同时，适当分配精力拓展非续保客源，构建更均衡的客户结构。' });
    } else {
      recs.push({ priority: 'primary', title: '【建议】降低续保依赖，拓展非续保业务', desc: '续保GMV占比偏高（>70%），一旦续保客户池收缩将严重影响业绩。建议：每月分配一定时间开拓新客户，逐步构建多元化的客户结构。' });
    }
  }

  var wd = dimResults['往年'];
  if (wd && wd.dealRate > 0 && wd.equip > 0 && wd.dealBench > 2 && wd.dealRate < wd.dealBench - 2) {
    recs.push({ priority: 'secondary', title: '【机会】挖掘往年客户中的沉睡价值', desc: '往年客户设备数不少但转化率偏低。建议：对往年客户做分层（近1年/2-3年），针对不同阶段设定差异化的触达策略。' });
  }

  // 下月商机预警
  var nxDims = {'次年':'续保客户', '新增':'新客', '往年':'往年客户', '战败':'战败客户'};
  var qtyWarnings = [], fwWarnings = [], dealWarnings = [];
  for (var d in dimResultsNext) {
    var drn = dimResultsNext[d];
    if (!drn || drn.issues.length === 0 || drn.equip === 0) continue;
    var label = nxDims[d] || d;
    var eqInfo = '下月到期' + d + '设备数' + drn.equip + '（中位' + drn.equipBench + '）';
    var hasQty = drn.issues.indexOf('量不足') >= 0;
    var hasFw = drn.issues.indexOf('跟进低') >= 0;
    var hasDeal = drn.issues.indexOf('转化低') >= 0;
    if (hasQty) qtyWarnings.push({ priority: 'primary', title: '【预警】下月' + label + '商机储备不足', desc: eqInfo + '，低于部门中位数70%，客户资源储备不够。建议提前盘点客户池、争取更多' + label + '线索。' });
    else if (hasFw) fwWarnings.push({ priority: 'primary', title: '【预警】下月' + label + '跟进待启动', desc: eqInfo + '，客户量充足但跟进率仅' + drn.followRate.toFixed(0) + '%（中位' + drn.followBench.toFixed(0) + '%）。建议尽快启动下月到期客户的续保联系。' });
    else if (hasDeal) dealWarnings.push({ priority: 'secondary', title: '【关注】下月' + label + '转化率偏低', desc: eqInfo + '，跟进尚可但转化率仅' + drn.dealRate.toFixed(0) + '%（中位' + drn.dealBench.toFixed(0) + '%）。建议分析未转化原因，优化续保话术。' });
  }
  var nextWarnings = qtyWarnings.concat(fwWarnings).concat(dealWarnings).slice(0, 2);
  recs.push.apply(recs, nextWarnings);

  var seen = {};
  var result = [];
  recs.forEach(function(r) { if (!seen[r.title]) { seen[r.title] = true; result.push(r); } });
  return result.slice(0, 5);
}

// ===== 渲染 =====
var radarChart = null;

function renderDiagnose(m, dept, bench, findings, dimResults, dimResultsNext, rootCauses, recs) {
  var panel = document.getElementById('diagnosePanel');

  var hasTarget = m['GMV目标'] > 0;
  var achColor = !hasTarget ? '#999' : (m['达成率'] >= TIME_PROGRESS ? '#2e7d32' : (m['达成率'] >= 60 ? '#e65100' : '#c62828'));
  var achBg = !hasTarget ? '#f5f5f5' : (m['达成率'] >= TIME_PROGRESS ? '#e8f5e9' : (m['达成率'] >= 60 ? '#fff3e0' : '#ffebee'));

  var dimCards = ['次年', '新增', '往年', '战败'].map(function(dim) {
    var dr = dimResults[dim];
    var statusClass = dr.status === 'good' ? 'good' : (dr.status === 'warn' ? 'warn' : 'bad');
    var statusEmoji = dr.status === 'good' ? 'OK' : (dr.status === 'warn' ? '⚠' : '!');
    var followColor = dr.followRate < (dr.followBench||100) - 5 ? '#c62828' : '#2e7d32';
    var dealColor = dr.dealRate < (dr.dealBench||100) - 5 ? '#c62828' : '#2e7d32';
    return '<div class="metric-box ' + statusClass + '">' +
      '<div style="font-weight:700;font-size:14px;margin-bottom:6px;">' + dim + '商机 ' + statusEmoji + '</div>' +
      '<div class="metric-val">' + dr.equip + '</div>' +
      '<div class="metric-label">设备数（中位 ' + dr.equipBench + '）</div>' +
      '<div style="margin-top:4px;font-size:12px;">' +
        '<span style="color:' + followColor + '">跟进 ' + dr.followRate.toFixed(0) + '%</span> | <span style="color:' + dealColor + '">转化 ' + dr.dealRate.toFixed(0) + '%</span>' +
      '</div>' +
      (dr.issues.length > 0 ? '<div style="margin-top:4px;font-size:11px;color:#c62828;">' + dr.issues.join('、') + '</div>' : '') +
    '</div>';
  }).join('');

  var dimCardsNext = ['次年', '新增', '往年', '战败'].map(function(dim) {
    var dr = dimResultsNext[dim];
    if (!dr || dr.equip === 0) return '<div class="metric-box neutral"><div style="font-weight:700;font-size:14px;margin-bottom:6px;color:#999;">' + dim + '商机</div><div style="font-size:14px;color:#999;">暂无数据</div></div>';
    var statusClass = dr.status === 'good' ? 'good' : (dr.status === 'warn' ? 'warn' : 'bad');
    var statusEmoji = dr.status === 'good' ? 'OK' : (dr.status === 'warn' ? '⚠' : '!');
    var followColor = dr.followRate < (dr.followBench||100) - 5 ? '#c62828' : '#2e7d32';
    var dealColor = dr.dealRate < (dr.dealBench||100) - 5 ? '#c62828' : '#2e7d32';
    return '<div class="metric-box ' + statusClass + '">' +
      '<div style="font-weight:700;font-size:14px;margin-bottom:6px;">' + dim + '商机 ' + statusEmoji + '</div>' +
      '<div class="metric-val">' + dr.equip + '</div>' +
      '<div class="metric-label">设备数（中位 ' + dr.equipBench + '）</div>' +
      '<div style="margin-top:4px;font-size:12px;">' +
        '<span style="color:' + followColor + '">跟进 ' + dr.followRate.toFixed(0) + '%</span> | <span style="color:' + dealColor + '">转化 ' + dr.dealRate.toFixed(0) + '%</span>' +
      '</div>' +
      (dr.issues.length > 0 ? '<div style="margin-top:4px;font-size:11px;color:#c62828;">' + dr.issues.join('、') + '</div>' : '') +
    '</div>';
  }).join('');

  var badgeHtml = findings.map(function(f) {
    var cls = f.severity === 'fail' ? 'badge-red' : (f.severity === 'warn' ? 'badge-orange' : (f.severity === 'pass' ? 'badge-green' : 'badge-yellow'));
    return '<span class="badge ' + cls + '">' + f.tag + '</span>';
  }).join('');

  var pathHtml = findings.map(function(f) {
    return '<div class="decision-node ' + f.severity + '"><strong>Level ' + f.level + ' — ' + f.tag + '</strong><br><span style="font-size:13px;">' + f.detail + '</span></div>';
  }).join('');

  var recHtml = recs.map(function(r) { return '<div class="rec-box ' + r.priority + '"><div class="rec-title">' + r.title + '</div><div class="rec-desc">' + r.desc + '</div></div>'; }).join('');
  var causeHtml = rootCauses.map(function(c) { return '<li style="margin-bottom:6px;color:#c62828;font-weight:600;">' + c + '</li>'; }).join('');

  panel.innerHTML =
    '<div class="grid2">' +
    '<div class="card" style="margin-bottom:20px;">' +
      '<h2>' + m['业务员'] + ' · ' + dept + '</h2>' +
      '<div class="metric-row">' +
        '<div class="metric-box" style="background:' + achBg + ';border-color:' + achColor + '33;">' +
          '<div class="metric-val" style="color:' + achColor + ';">' + (hasTarget ? m['达成率'].toFixed(1) + '%' : '未设定') + '</div>' +
          '<div class="metric-label">GMV达成率（' + (hasTarget ? '目标¥' + (m['GMV目标']/10000).toFixed(0) + '万' : '目标未录入') + '）</div>' +
          '<div class="metric-vs">时间进度 ' + TIME_PROGRESS + '%</div>' +
        '</div>' +
        '<div class="metric-box neutral"><div class="metric-val">¥' + (m['GMV']/10000).toFixed(1) + '</div><div class="metric-label">GMV实际（万）</div></div>' +
        '<div class="metric-box neutral"><div class="metric-val">¥' + (m['续保GMV']/10000).toFixed(1) + '</div><div class="metric-label">续保GMV-万（' + m['续保占比'].toFixed(0) + '%）</div></div>' +
        '<div class="metric-box neutral"><div class="metric-val">¥' + (m['非续保GMV']/10000).toFixed(1) + '</div><div class="metric-label">非续保GMV-万（' + (100 - m['续保占比']).toFixed(0) + '%）</div></div>' +
      '</div>' +
      '<div style="margin-top:14px;display:flex;flex-wrap:wrap;gap:6px;">' + badgeHtml + '</div>' +
    '</div>' +
    '<div class="card" style="margin-bottom:20px;">' +
      '<h2>核心指标雷达图</h2>' +
      '<div class="chart-container"><canvas id="radarChart"></canvas></div>' +
    '</div>' +
    '</div>' +
    '<div class="card"><h2>诊断路径（逐层排查）</h2><div class="decision-path">' + pathHtml + '</div></div>' +
    '<div class="card"><h2>商机四维度过程诊断 — ' + CURRENT_LABEL + '</h2><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;">' + dimCards + '</div></div>' +
    '<div class="card"><h2>商机四维度过程诊断 — ' + NEXT_LABEL + ' <span style="font-weight:400;font-size:12px;color:#888;">（提前关注）</span></h2><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;">' + dimCardsNext + '</div><p style="margin-top:10px;font-size:12px;color:#888;">保险客户可提前一个月续保，建议在当月下旬开始关注下月到期客户的跟进与转化。</p></div>' +
    '<div class="grid2">' +
      '<div class="card"><h2>根因定位</h2><ol style="padding-left:18px;font-size:14px;">' + causeHtml + '</ol></div>' +
      '<div class="card"><h2>提升方向与动作建议</h2>' + recHtml + '</div>' +
    '</div>' +
    '<div class="card">' +
      '<h2>诊断方法论说明</h2>' +
      '<div class="methodology">' +
        '<p style="margin-bottom:10px;">本框架采用<strong>四层递进诊断法</strong>，从业绩结果反推过程根因：</p>' +
        '<table>' +
          '<tr style="background:#e8eaf6;"><th>层级</th><th>诊断维度</th><th>判断标准</th><th>如果异常 →</th></tr>' +
          '<tr><td><strong>L1</strong></td><td>业绩结果</td><td>GMV达成率 vs 时间进度</td><td>→ 进入过程诊断</td></tr>' +
          '<tr style="background:#f5f5f5;"><td><strong>L2</strong></td><td>业绩结构</td><td>续保GMV占比 vs 部门中位数</td><td>→ 确定主力依赖维度</td></tr>' +
          '<tr><td><strong>L3</strong></td><td>过程指标（4维度×2月）</td><td>设备数→客户池够不够<br>跟进率→跟进有没有做<br>转化率→做了能不能成交</td><td>量不足→开源<br>跟进低→执行力<br>转化低→销售能力</td></tr>' +
          '<tr style="background:#f5f5f5;"><td><strong>L4</strong></td><td>根因归类</td><td>综合L1-L3交叉分析（含下月预警）</td><td>→ 给出具体提升动作</td></tr>' +
        '</table>' +
        '<p style="margin-top:12px;font-size:12px;color:#999;">⚠ 数据来源：Grafana看板（GMV统计 + 商机转化看板） | 对比基准为同部门中位数<br>⚠ "设备数"=到期/可跟进客户数；"跟进率"=已跟进/总设备数；"转化率"=成交/总设备数。</p>' +
      '</div>' +
    '</div>';

  // 渲染雷达图
  setTimeout(function() {
    var ctx = document.getElementById('radarChart');
    if (!ctx) return;
    if (radarChart) radarChart.destroy();
    var labels = ['GMV达成率', '次年转化力', '新增开拓力', '往年挖掘力', '战败挽回力', '跟进执行力'];
    var myData = [
      m['达成率'],
      (m['次年_次年转化率']||0) * 100,
      (m['新增_新增转化率']||0) * 100,
      (m['往年_往年转化率']||0) * 100,
      (m['战败_战败转化率']||0) * 100,
      (['次年','新增','往年','战败'].reduce(function(s,d){return s+(m[d+'_'+d+'跟进率']||0);},0)/4*100)
    ];
    var benchData = [
      TIME_PROGRESS,
      bench['次年转化率'] || 0,
      bench['新增转化率'] || 0,
      bench['往年转化率'] || 0,
      bench['战败转化率'] || 0,
      (bench['次年跟进率']+bench['新增跟进率']+bench['往年跟进率']+bench['战败跟进率'])/4 || 0
    ];
    radarChart = new Chart(ctx, {
      type: 'radar',
      data: {
        labels: labels,
        datasets: [
          { label: m['业务员'], data: myData, borderColor: '#3949ab', backgroundColor: 'rgba(57,73,171,0.15)', borderWidth: 2, pointRadius: 4, pointBackgroundColor: '#3949ab' },
          { label: dept + '中位数', data: benchData, borderColor: '#ef6c00', backgroundColor: 'rgba(239,108,0,0.05)', borderWidth: 1.5, borderDash: [5,5], pointRadius: 2, pointBackgroundColor: '#ef6c00' }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: { legend: { position: 'bottom', labels: { font: { size: 12 } } } },
        scales: { r: { beginAtZero: false, min: 0, ticks: { stepSize: 20, font: { size: 10 }, backdropColor: 'transparent' }, pointLabels: { font: { size: 11 } } } }
      }
    });
  }, 100);
}

</script>
